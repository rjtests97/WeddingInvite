<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        theme: {
                            bg: '#fdf5f0',
                            peach: '#f7d6ce',
                            dark: '#302322',
                            accent: '#a76a5b',
                            text: '#4a3b3a'
                        }
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Environmental Animations */
        @keyframes float-up {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
        .flower { position: fixed; z-index: 40; pointer-events: none; animation: float-up linear infinite; }
        .diya-glow { animation: pulse-glow 3s ease-in-out infinite; }
        html { scroll-behavior: smooth; background-color: #fdf5f0; }
        body { overflow-x: hidden; color: #4a3b3a; }
        
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e0c8c3; border-radius: 10px; }
    </style>
</head>
<body class="font-sans antialiased selection:bg-theme-peach selection:text-theme-dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURATION ---
        const config = {
            couple: { bride: "Pragati", groom: "Yash" },
            parents: { bride: "Mr. & Mrs. Sharma", groom: "Mr. & Mrs. Verma" },
            date: { target: "2026-11-15T16:00:00", display: "15 DECEMBER 2026" },
            whatsapp: "1234567890",
            tags: ["HOPELESS ROMANTICS", "CHAI ADDICTS", "JODHPUR DREAMERS", "FOREVER & ALWAYS"],
            events: [
                { title: "Mehendi", date: "14 DEC • 2:00 PM", venue: "GARDEN PAVILION", desc: "Henna artistry, folk music, and the scent of marigold.", icon: "🌿" },
                { title: "Haldi", date: "15 DEC • 10:00 AM", venue: "CRYSTAL HALL", desc: "Golden hues, saffron paste, and laughter in the morning air.", icon: "🥣" },
                { title: "Cocktail", date: "15 DEC • 7:30 PM", venue: "ZENANA COURTYARD", desc: "Elegance under the stars with cocktails and conversation.", icon: "🥂" },
                { title: "Shaadi", date: "16 DEC • 11:00 AM", venue: "BALLROOM & GARDENS", desc: "Seven vows, one lifetime — the ceremony begins.", icon: "💍" },
                { title: "Reception", date: "16 DEC • 7:00 PM", venue: "GRAND TERRACE", desc: "Dance, dine, and celebrate as the newlyweds take the floor.", icon: "✨" }
            ],
            gallery: [
                "https://images.unsplash.com/photo-1583939003579-730e3918a45a?auto=format&fit=crop&w=600&q=80",
                "https://images.unsplash.com/photo-1606800052052-a08af7148866?auto=format&fit=crop&w=600&q=80",
                "https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=600&q=80"
            ]
        };

        // --- UTILS ---
        const useIntersectionObserver = (options) => {
            const [isIntersecting, setIsIntersecting] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsIntersecting(true);
                        observer.unobserve(entry.target);
                    }
                }, options);
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [options]);
            return [ref, isIntersecting];
        };

        const FadeIn = ({ children, delay = 0, className = "" }) => {
            const [ref, isVisible] = useIntersectionObserver({ threshold: 0.1 });
            return (
                <div ref={ref} style={{ transitionDelay: `${delay}ms` }}
                    className={`transition-all duration-1000 ease-out transform ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'} ${className}`}>
                    {children}
                </div>
            );
        };

        // --- COMPONENTS ---
        const FloatingEnvironment = () => {
            const elements = Array.from({ length: 12 }).map((_, i) => ({
                left: `${Math.random() * 100}vw`,
                animationDuration: `${Math.random() * 10 + 10}s`,
                animationDelay: `${Math.random() * 5}s`,
                opacity: Math.random() * 0.5 + 0.3,
                fontSize: `${Math.random() * 20 + 20}px`
            }));

            return (
                <div className="fixed inset-0 pointer-events-none z-40 overflow-hidden">
                    {elements.map((style, i) => (
                        <div key={i} className="flower text-theme-peach" style={style}>🌸</div>
                    ))}
                </div>
            );
        };

        const Countdown = ({ targetDate }) => {
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

            useEffect(() => {
                const timer = setInterval(() => {
                    const difference = new Date(targetDate) - new Date();
                    if (difference > 0) {
                        setTimeLeft({
                            days: Math.floor(difference / (1000 * 60 * 60 * 24)),
                            hours: Math.floor((difference / (1000 * 60 * 60)) % 24),
                            minutes: Math.floor((difference / 1000 / 60) % 60),
                            seconds: Math.floor((difference / 1000) % 60)
                        });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [targetDate]);

            return (
                <div className="flex justify-center gap-6 text-theme-dark mt-8 border-t border-theme-accent/20 pt-6">
                    {Object.entries(timeLeft).map(([unit, value]) => (
                        <div key={unit} className="flex flex-col items-center">
                            <span className="text-3xl font-serif">{value.toString().padStart(2, '0')}</span>
                            <span className="text-[10px] tracking-widest uppercase mt-1 text-theme-accent">{unit}</span>
                        </div>
                    ))}
                </div>
            );
        };

        // --- SECTIONS ---
        const Hero = () => (
            <section className="relative min-h-[100dvh] w-full flex flex-col items-center justify-end pb-24 overflow-hidden bg-gradient-to-b from-[#f5d5cc] via-[#fdf5f0] to-[#fdf5f0]">
                {/* Glowing Moon & Diyas */}
                <div className="absolute top-[10%] right-[10%] w-32 h-32 rounded-full bg-white blur-xl opacity-60 mix-blend-overlay"></div>
                
                {/* Center Palace Graphic */}
                <div className="absolute top-[20%] w-full max-w-lg px-6 z-10 flex justify-center">
                    <img src="https://cdn.pixabay.com/photo/2019/04/17/12/12/taj-mahal-4134177_1280.png" alt="Palace" className="w-full h-auto drop-shadow-2xl opacity-90" />
                </div>

                <div className="relative z-20 text-center px-4 mt-[50vh]">
                    <FadeIn>
                        <h1 className="text-6xl md:text-8xl text-theme-dark font-serif drop-shadow-sm mb-2">{config.couple.bride}</h1>
                        <p className="text-theme-accent text-sm font-sans tracking-[0.3em] uppercase my-2">Weds</p>
                        <h1 className="text-6xl md:text-8xl text-theme-dark font-serif drop-shadow-sm">{config.couple.groom}</h1>
                    </FadeIn>
                    <FadeIn delay={200}>
                        <Countdown targetDate={config.date.target} />
                    </FadeIn>
                </div>
            </section>
        );

        const ElephantsAndBlessings = () => (
            <section className="w-full flex flex-col items-center pt-10 pb-24 px-6 bg-[#fdf5f0] relative z-20">
                {/* Decorative Garland */}
                <div className="w-full max-w-3xl border-t border-theme-accent/30 mb-12 relative flex justify-center">
                    <div className="absolute -top-4 bg-[#fdf5f0] px-4 text-theme-accent/50 text-2xl">✤</div>
                </div>

                {/* Elephants Pattern */}
                <FadeIn className="flex justify-center gap-4 md:gap-12 w-full max-w-2xl mb-16 opacity-80">
                    <img src="https://cdn-icons-png.flaticon.com/512/3714/3714609.png" alt="Elephant Left" className="w-32 md:w-48 transform scale-x-[-1]" />
                    <img src="https://cdn-icons-png.flaticon.com/512/3714/3714609.png" alt="Elephant Right" className="w-32 md:w-48" />
                </FadeIn>

                {/* Blessings Card */}
                <FadeIn delay={200} className="relative w-full max-w-xl border border-theme-accent/20 bg-white/50 backdrop-blur-sm p-12 text-center shadow-2xl shadow-theme-peach/20">
                    {/* Corner accents */}
                    <div className="absolute top-4 left-4 w-6 h-6 border-t border-l border-theme-accent/40"></div>
                    <div className="absolute top-4 right-4 w-6 h-6 border-t border-r border-theme-accent/40"></div>
                    <div className="absolute bottom-4 left-4 w-6 h-6 border-b border-l border-theme-accent/40"></div>
                    <div className="absolute bottom-4 right-4 w-6 h-6 border-b border-r border-theme-accent/40"></div>

                    <div className="w-16 h-16 mx-auto mb-8 bg-theme-peach/30 rounded-full flex items-center justify-center text-3xl">🕉️</div>
                    
                    <p className="font-serif italic text-theme-text text-lg mb-8 leading-relaxed">
                        With the blessings of the divine<br/>and the love of our families
                    </p>
                    
                    <p className="text-[10px] tracking-[0.2em] uppercase text-theme-accent mb-6">Together we invite you to celebrate</p>
                    
                    <h2 className="text-4xl font-serif text-theme-dark mb-10">
                        {config.couple.bride} <span className="text-theme-accent text-2xl">&</span> {config.couple.groom}
                    </h2>

                    <div className="space-y-8 font-serif text-theme-text">
                        <div>
                            <p className="text-[10px] font-sans tracking-[0.2em] uppercase text-theme-accent/70 mb-2">Daughter of</p>
                            <p className="text-lg">{config.parents.bride}</p>
                        </div>
                        <div className="text-theme-accent/30 text-xl">✦</div>
                        <div>
                            <p className="text-[10px] font-sans tracking-[0.2em] uppercase text-theme-accent/70 mb-2">Son of</p>
                            <p className="text-lg">{config.parents.groom}</p>
                        </div>
                    </div>
                </FadeIn>
            </section>
        );

        const Events = () => (
            <section className="py-24 px-6 bg-[#fbf1ec] text-center">
                <FadeIn>
                    <p className="text-[10px] tracking-[0.3em] uppercase text-theme-accent mb-2">The Celebrations</p>
                    <h2 className="text-5xl md:text-6xl font-serif text-theme-dark mb-20">Our <span className="italic text-theme-accent">Events</span></h2>
                </FadeIn>

                <div className="max-w-md mx-auto space-y-24">
                    {config.events.map((event, idx) => (
                        <FadeIn key={idx} delay={100} className="flex flex-col items-center group">
                            {/* Circle Icon Container */}
                            <div className="w-28 h-28 rounded-full border border-theme-accent/30 bg-white/60 flex items-center justify-center text-5xl mb-6 shadow-xl shadow-theme-peach/20 transform group-hover:scale-105 transition-transform duration-500">
                                {event.icon}
                            </div>
                            
                            <h3 className="text-3xl font-serif text-theme-dark mb-2">{event.title}</h3>
                            <p className="text-xs font-sans tracking-[0.2em] uppercase text-theme-text mb-1">{event.date}</p>
                            <p className="text-[10px] font-sans tracking-[0.2em] uppercase text-theme-accent mb-4">{event.venue}</p>
                            <p className="text-theme-text/80 font-serif italic text-sm mb-4 px-4">{event.desc}</p>
                            
                            <a href="#" className="inline-flex items-center gap-2 text-[10px] tracking-[0.1em] uppercase text-theme-accent border-b border-theme-accent/30 pb-1 hover:text-theme-dark transition-colors">
                                📍 Open in Google Maps
                            </a>
                        </FadeIn>
                    ))}
                </div>
            </section>
        );

        const MeetTheCouple = () => (
            <section className="py-24 px-6 bg-[#fdf5f0] overflow-hidden">
                <div className="max-w-4xl mx-auto text-center relative">
                    <FadeIn>
                        <p className="text-[10px] tracking-[0.3em] uppercase text-theme-accent mb-2">Our Journey</p>
                        <h2 className="text-4xl md:text-5xl font-serif text-theme-dark mb-6">Meet the Couple</h2>
                        <h1 className="text-6xl md:text-7xl font-serif text-theme-dark mb-6">
                            {config.couple.bride} <span className="text-theme-accent">&</span> {config.couple.groom}
                        </h1>
                        <p className="font-serif italic text-theme-text mb-12">
                            Two souls, one chai stall, a lifetime of mornings together.
                        </p>
                    </FadeIn>

                    {/* Tags */}
                    <FadeIn delay={200} className="flex flex-wrap justify-center gap-4 mb-16">
                        {config.tags.map((tag, idx) => (
                            <span key={idx} className="px-6 py-3 border border-theme-accent/40 rounded-sm text-xs tracking-widest uppercase text-theme-dark bg-white/50">
                                {tag}
                            </span>
                        ))}
                    </FadeIn>

                    {/* Illustrated Figures Setup (Using placeholders styled to match video positions) */}
                    <div className="relative w-full h-64 border-t border-b border-theme-accent/20 flex justify-between items-end px-4 md:px-20 bg-white/30">
                        <img src="https://cdn-icons-png.flaticon.com/512/9306/9306443.png" alt="Bride Illustration" className="w-32 h-auto opacity-80" />
                        <img src="https://cdn-icons-png.flaticon.com/512/9306/9306437.png" alt="Groom Illustration" className="w-32 h-auto opacity-80 transform scale-x-[-1]" />
                    </div>
                </div>
            </section>
        );

        const Gallery = () => (
            <section className="py-24 px-4 bg-[#fbf1ec]">
                <FadeIn className="text-center mb-16">
                    <p className="text-[10px] tracking-[0.3em] uppercase text-theme-accent mb-2">Moments</p>
                    <h2 className="text-5xl font-serif text-theme-dark">Our <span className="italic text-theme-accent">Gallery</span></h2>
                </FadeIn>

                <div className="max-w-4xl mx-auto grid grid-cols-2 gap-4">
                    <FadeIn delay={100} className="col-span-2 md:col-span-1">
                        <img src={config.gallery[0]} alt="Gallery 1" className="w-full h-full object-cover rounded-sm border-4 border-white shadow-lg" />
                    </FadeIn>
                    <div className="col-span-2 md:col-span-1 flex flex-col gap-4">
                        <FadeIn delay={200}>
                            <img src={config.gallery[1]} alt="Gallery 2" className="w-full h-64 object-cover rounded-sm border-4 border-white shadow-lg" />
                        </FadeIn>
                        <FadeIn delay={300}>
                            <img src={config.gallery[2]} alt="Gallery 3" className="w-full h-64 object-cover rounded-sm border-4 border-white shadow-lg" />
                        </FadeIn>
                    </div>
                </div>
            </section>
        );

        const RSVP = () => {
            const waLink = `https://wa.me/${config.whatsapp}?text=Hi!%20We%20will%20be%20attending%20the%20wedding!`;

            return (
                <section className="py-24 px-6 bg-[#fdf5f0] text-center border-b-[16px] border-theme-dark">
                    <FadeIn>
                        <p className="text-[10px] tracking-[0.3em] uppercase text-theme-accent mb-2">Join the Celebration</p>
                        <h2 className="text-5xl md:text-6xl font-serif text-theme-dark mb-6">Will you <span className="italic text-theme-accent">join us?</span></h2>
                        <p className="font-serif italic text-theme-text max-w-lg mx-auto mb-12 leading-relaxed">
                            We've saved a seat for you — at our table, in our hearts, and under the sky. Come celebrate with us as we begin this new chapter together.
                        </p>

                        {/* WhatsApp Button */}
                        <a href={waLink} target="_blank" rel="noopener noreferrer" 
                           className="inline-flex items-center justify-center w-full max-w-md bg-theme-dark text-[#fdf5f0] py-5 px-8 rounded-sm text-sm font-semibold tracking-widest uppercase hover:bg-black transition-colors shadow-2xl mb-4">
                            <svg className="w-5 h-5 mr-3 fill-current" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766 0 1.252.327 2.476.947 3.553l-.841 3.074 3.148-.826c1.037.568 2.215.867 3.421.867 3.18 0 5.768-2.585 5.768-5.767 0-3.181-2.588-5.767-5.768-5.767zm3.431 8.232c-.187.525-1.096.985-1.503 1.05-.415.066-.827.185-2.392-.464-1.89-1.04-3.1-3.003-3.195-3.13-.092-.125-.764-1.018-.764-1.942 0-.923.477-1.378.644-1.554.168-.175.364-.219.485-.219.123 0 .245.002.35.005.109.005.253-.042.396.304.144.347.491 1.2.535 1.288.043.088.072.19.015.305-.058.115-.087.188-.174.288-.086.1-.183.218-.26.3-.086.09-.176.188-.075.362.102.175.454.75 1.033 1.267.747.669 1.308.874 1.488.963.178.089.284.075.39-.045.105-.119.453-.526.577-.706.122-.18.243-.15.406-.089.163.061 1.033.488 1.21.577.178.09.296.136.34.214.043.078.043.453-.144.978z"/><path d="M12.031 2C6.49 2 2 6.49 2 12.031c0 1.77.464 3.5 1.344 5.022L2 22l5.084-1.33A9.97 9.97 0 0 0 12.031 22c5.541 0 10.031-4.49 10.031-10.031S17.572 2 12.031 2zm0 18.375c-1.503 0-2.977-.404-4.269-1.168l-.306-.182-3.17.828.843-3.091-.2-.317A8.344 8.344 0 0 1 3.656 12.03c0-4.618 3.757-8.375 8.375-8.375 4.619 0 8.376 3.757 8.376 8.375 0 4.618-3.757 8.375-8.375 8.375z"/></svg>
                            Yes, I'll be there
                        </a>
                        <p className="text-xs text-theme-text/60 mb-16">You'll be redirected to WhatsApp to confirm your attendance.</p>

                        {/* Calendar Buttons */}
                        <p className="text-[10px] tracking-[0.2em] uppercase text-theme-accent mb-6">Save the Date</p>
                        <div className="flex flex-col md:flex-row justify-center gap-4 max-w-md mx-auto">
                            <button className="flex-1 border border-theme-accent/40 py-4 text-xs tracking-widest uppercase text-theme-dark hover:bg-theme-accent/5 transition-colors">Google Calendar</button>
                            <button className="flex-1 border border-theme-accent/40 bg-[#d8a898] py-4 text-xs tracking-widest uppercase text-white hover:bg-[#c99583] transition-colors">Apple / iCal</button>
                        </div>
                    </FadeIn>
                </section>
            );
        };

        const Footer = () => (
            <footer className="bg-theme-dark text-[#fdf5f0] py-16 text-center">
                <div className="w-6 h-6 mx-auto border-t border-l border-theme-peach/40 rotate-45 mb-8"></div>
                <h2 className="text-4xl font-serif mb-4">
                    {config.couple.bride} <span className="text-theme-peach italic">&</span> {config.couple.groom}
                </h2>
                <p className="tracking-[0.3em] text-[10px] uppercase opacity-70 font-sans">
                    {config.date.display}
                </p>
            </footer>
        );

        const App = () => (
            <>
                <FloatingEnvironment />
                <Hero />
                <ElephantsAndBlessings />
                <Events />
                <MeetTheCouple />
                <Gallery />
                <RSVP />
                <Footer />
            </>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
